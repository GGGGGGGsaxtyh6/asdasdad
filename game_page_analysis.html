        var iframe = document.getElementById('ifm');

        function pageY(elem) {
            return elem.offsetParent ? (elem.offsetTop + pageY(elem.offsetParent)) : elem.offsetTop;
        }

        function resizeIframe() {
            var device_specific_classes = '';
            var height = document.documentElement.clientHeight;
            if(device_specific_classes === 'iphonex_layout') {
                height = document.documentElement.scrollHeight;
            }
            var frameOffset = pageY(document.getElementById('ifm'))+ buffer ;
            var footerOffset = document.getElementById('branding_footer').clientHeight;
            height -= frameOffset;
            height -= footerOffset;
            height = (height < 0) ? 0 : height;
            document.getElementById('ifm').style.height = height + 'px';
        }

        // .onload doesn't work with IE8 and older.
        if (iframe.attachEvent) {
            iframe.attachEvent("onload", resizeIframe);
        } else {
            iframe.onload=resizeIframe;
        }


        function onPostMessage(event) {
            const { data, origin } = event;
            if (origin !== window.location.origin) {
                return;
            }
            if(data.url) {
                if (data.type === 'logout') {
                    const logOutForm = document.getElementById('sg_logout');
                    logOutForm.action = data.url;
                    logOutForm.submit();
                }
                if (data.type === "change_location") {
                    window.location.assign(data.url)
                }
            }
        }
        window.onmessage = onPostMessage;
        window.onresize = resizeIframe;
        resizeIframe();
