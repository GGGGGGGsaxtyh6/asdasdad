[supervisord]
nodaemon=true
user=root
directory=/var/log/supervisor
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=warn

[program:redis]
command=redis-server /etc/redis/redis.conf
directory=/var/lib/redis
autostart=true
autorestart=true
stderr_logfile=/var/log/redis.err.log
stdout_logfile=/var/log/redis.out.log

[program:redis_init]
command=/etc/redis/redis_init.sh
autostart=true
autorestart=false
startsecs=0
exitcodes=0
stderr_logfile=/var/log/init_redis.err.log
stdout_logfile=/var/log/init_redis.out.log

[program:cdn-service]
command=/cdn-service/cdn-service
directory=/cdn-service
autostart=true
autorestart=true
stderr_logfile=/var/log/cdn-service.err.log
stdout_logfile=/var/log/cdn-service.out.log

[program:web-app]
command=python /app/app.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/web-app.err.log
stdout_logfile=/var/log/web-app.out.log
