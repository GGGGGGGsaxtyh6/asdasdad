version: '3.8'

services:
  # Servicio principal de testing
  eci-testing:
    build:
      context: ../..
      dockerfile: ci-cd/docker/Dockerfile
    container_name: eci-testing
    environment:
      - ENVIRONMENT=dev
      - LOG_LEVEL=DEBUG
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/eci_test
      - REDIS_URL=redis://redis:6379/0
      - JIRA_URL=${JIRA_URL}
      - JIRA_USERNAME=${JIRA_USERNAME}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - CONFLUENCE_URL=${CONFLUENCE_URL}
      - CONFLUENCE_USERNAME=${CONFLUENCE_USERNAME}
      - CONFLUENCE_API_TOKEN=${CONFLUENCE_API_TOKEN}
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./test_data:/app/test_data
    depends_on:
      - postgres
      - redis
      - pact-broker
    networks:
      - eci-testing-network
    command: ["python", "-m", "pytest", "api_testing/", "-v", "--html=reports/api-test-report.html", "--self-contained-html"]

  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: eci-postgres
    environment:
      - POSTGRES_DB=eci_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - eci-testing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para cache
  redis:
    image: redis:7-alpine
    container_name: eci-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eci-testing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pact Broker para contract testing
  pact-broker:
    image: pactfoundation/pact-broker:latest
    container_name: eci-pact-broker
    environment:
      - PACT_BROKER_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/pact_broker
      - PACT_BROKER_BASIC_AUTH_USERNAME=admin
      - PACT_BROKER_BASIC_AUTH_PASSWORD=admin
    ports:
      - "9292:9292"
    depends_on:
      - postgres
    networks:
      - eci-testing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9292/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Servidor de reportes
  report-server:
    image: nginx:alpine
    container_name: eci-report-server
    ports:
      - "8080:80"
    volumes:
      - ./reports:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - eci-testing
    networks:
      - eci-testing-network

  # Servicio de monitoreo
  monitoring:
    image: prom/prometheus:latest
    container_name: eci-monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - eci-testing-network

  # Grafana para dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: eci-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - monitoring
    networks:
      - eci-testing-network

  # Servicio de notificaciones
  notification-service:
    build:
      context: ../..
      dockerfile: ci-cd/docker/notification.Dockerfile
    container_name: eci-notifications
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    volumes:
      - ./reports:/app/reports:ro
    depends_on:
      - eci-testing
    networks:
      - eci-testing-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  eci-testing-network:
    driver: bridge